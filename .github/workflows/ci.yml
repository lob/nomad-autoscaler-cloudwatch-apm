name: CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOTELEMETRY: "off"
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: ^1.25

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - run: make test build
