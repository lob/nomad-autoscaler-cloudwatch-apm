name: Publish to S3

on:
  workflow_dispatch:
    inputs:
      version:
        description: "GitHub Release tag to publish (e.g. v1.2.3)"
        required: true
        type: string

jobs:
  publish:
    runs-on: lob-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.version }}" \
            --pattern "nomad-autoscaler-cloudwatch-apm_linux_*" \
            --dir ./dist

      - name: Upload to S3
        run: |
          aws s3 cp dist/nomad-autoscaler-cloudwatch-apm_linux_amd64 \
            s3://lob-nomad-autoscaler-plugins/cloudwatch/${{ inputs.version }}/nomad-autoscaler-cloudwatch-apm_linux_amd64
          aws s3 cp dist/nomad-autoscaler-cloudwatch-apm_linux_arm64 \
            s3://lob-nomad-autoscaler-plugins/cloudwatch/${{ inputs.version }}/nomad-autoscaler-cloudwatch-apm_linux_arm64
